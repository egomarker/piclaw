name: E2E Tests

on:
  push:
    tags:
      - '*-ux'
      - '*-prerelease'
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  e2e:
    name: E2E UX regression tests / ${{ matrix.stage }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        include:
          - stage: smoke-and-shell
            specs: >-
              steps/favicon-branding.spec.ts
              steps/us01-morning-triage.spec.ts
              steps/us11-pwa-manifest.spec.ts
              steps/timeline-rendering.spec.ts
          - stage: compose-queue
            specs: >-
              steps/us02-queue-steer.spec.ts
          - stage: message-deletion
            specs: >-
              steps/us16-message-deletion.spec.ts
          - stage: compose-visibility
            specs: >-
              steps/us17-compose-instant-visibility.spec.ts
              steps/us24-btw-panel.spec.ts
          - stage: theme-tint
            specs: >-
              steps/theme-tint-commands.spec.ts
          - stage: sessions-and-settings
            specs: >-
              steps/us03-session-switching.spec.ts
              steps/us06-settings.spec.ts
              steps/us09-session-lifecycle.spec.ts
              steps/us12-system-meters.spec.ts
              steps/us12-thoughts-panel.spec.ts
          - stage: workspace-editor
            specs: >-
              steps/us04-editor.spec.ts
              steps/us08-panes.spec.ts
              steps/us10-workspace-files.spec.ts
          - stage: terminal-panes
            specs: >-
              steps/us13-15-terminal.spec.ts
          - stage: screenshots-and-resilience
            specs: >-
              steps/us05-screenshots.spec.ts
              steps/us07-reconnection.spec.ts
              steps/us20-lightbox-dismissal.spec.ts
              steps/us21-swipe-independence.spec.ts
              steps/us22-settings-layering.spec.ts
          - stage: compaction-model
            specs: >-
              steps/us18-19-compaction-model.spec.ts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install E2E dependencies
        run: bun install --frozen-lockfile
        working-directory: tests/e2e

      - name: Install Playwright browsers
        run: bunx playwright install chromium
        working-directory: tests/e2e

      - name: Configure LLM provider (GitHub Models)
        run: bun run setup/configure-github-models.ts
        working-directory: tests/e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Start PiClaw instance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate a test internal secret
          export PICLAW_INTERNAL_SECRET=$(openssl rand -hex 16)
          echo "PICLAW_INTERNAL_SECRET=$PICLAW_INTERNAL_SECRET" >> $GITHUB_ENV

          # Start piclaw in background with test config
          export PICLAW_WORKSPACE=$(mktemp -d)
          echo "PICLAW_WORKSPACE=$PICLAW_WORKSPACE" >> $GITHUB_ENV
          mkdir -p "$PICLAW_WORKSPACE/.piclaw"

          # Write minimal config and seed one known root file for workspace/editor UX tests.
          echo '{"sessionAutoRotate":true}' > "$PICLAW_WORKSPACE/.piclaw/config.json"
          cp AGENTS.md "$PICLAW_WORKSPACE/AGENTS.md"

          # Start server
          export PICLAW_WEB_PORT=3000
          echo "PICLAW_WEB_PORT=$PICLAW_WEB_PORT" >> $GITHUB_ENV
          bun run start > "$PICLAW_WORKSPACE/piclaw-e2e-server.log" 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Server process exited before becoming ready" >&2
              exit 1
            fi
            sleep 1
          done

      - name: Validate test environment
        run: bun run setup/validate-test-config.ts
        working-directory: tests/e2e
        env:
          PICLAW_E2E_URL: http://localhost:3000
          PICLAW_INTERNAL_SECRET: ${{ env.PICLAW_INTERNAL_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E tests (${{ matrix.stage }})
        run: bun run test -- ${{ matrix.specs }} --project=desktop-chrome
        working-directory: tests/e2e
        env:
          PICLAW_E2E_URL: http://localhost:3000
          PICLAW_INTERNAL_SECRET: ${{ env.PICLAW_INTERNAL_SECRET }}
          PICLAW_E2E_INTERNAL_SECRET: ${{ env.PICLAW_INTERNAL_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate PDF report
        if: always()
        run: bun run report
        working-directory: tests/e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report-${{ matrix.stage }}
          path: |
            tests/e2e/reports/piclaw-e2e-report.pdf
            tests/e2e/reports/piclaw-e2e-report.html
            tests/e2e/reports/results.json
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ matrix.stage }}
          path: tests/e2e/test-results/
          retention-days: 7

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
