name: Publish macOS Intel release assets

on:
  push:
    tags:
      - 'mac-intel-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-runtime-versions:
    name: Read pinned runtime versions
    runs-on: ubuntu-latest
    outputs:
      bun_version: ${{ steps.resolve-bun.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show workflow ref/debug info
        run: |
          echo "GITHUB_WORKFLOW=$GITHUB_WORKFLOW"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "Checked out commit:"
          git rev-parse HEAD
          git log -1 --oneline
          echo ""
          echo "Workflow file header from checked-out commit:"
          sed -n '1,40p' .github/workflows/publish.yml

      - name: Read Bun version from repo file
        id: resolve-bun
        run: |
          version=$(tr -d '[:space:]' < BUN_VERSION)
          if [ -z "$version" ]; then
            echo "BUN_VERSION file is empty"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-portable-artifacts:
    name: Build portable artifact (macos-x64)
    needs: [resolve-runtime-versions]
    runs-on: macos-15-intel

    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      npm_config_macos_deployment_target: "12.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show checked-out commit
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          sw_vers
          uname -m
          git rev-parse HEAD
          git log -1 --oneline

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ needs.resolve-runtime-versions.outputs.bun_version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build portable artifact
        run: bun run release:build-portable

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: piclaw-${{ github.ref_name }}-macos-x64-portable
          path: artifacts/release/*
          if-no-files-found: error

  build-experimental-shell-artifacts:
    name: Build experimental shell (macos-x64)
    needs: [resolve-runtime-versions]
    runs-on: macos-13
    timeout-minutes: 45

    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      CMAKE_OSX_DEPLOYMENT_TARGET: "12.0"
      npm_config_macos_deployment_target: "12.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show checked-out commit
        run: |
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_SHA=$GITHUB_SHA"
          sw_vers
          uname -m
          git rev-parse HEAD
          git log -1 --oneline

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ needs.resolve-runtime-versions.outputs.bun_version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build experimental shell artifact
        run: bun run release:build-experimental-shell

      - name: Verify launcher macOS deployment target
        run: |
          set -euo pipefail

          launcher=$(find build artifacts -path "*/Contents/MacOS/launcher" -type f | head -n 1)
          if [ -z "$launcher" ]; then
            echo "::error::launcher not found"
            exit 1
          fi

          echo "Launcher: $launcher"
          file "$launcher"
          otool -l "$launcher" | grep -A5 -E "LC_BUILD_VERSION|LC_VERSION_MIN_MACOSX"

          if otool -l "$launcher" | grep -q "minos 15."; then
            echo "::error::Electrobun launcher was built with macOS 15 minimum deployment target"
            exit 1
          fi

      - name: Upload experimental shell artifact
        uses: actions/upload-artifact@v7
        with:
          name: piclaw-desktop-${{ github.ref_name }}-macos-x64
          path: artifacts/release/piclaw-desktop-*
          if-no-files-found: error

  publish-release-assets:
    name: Publish macOS Intel release assets
    needs: [build-portable-artifacts, build-experimental-shell-artifacts]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download portable artifact
        uses: actions/download-artifact@v8
        with:
          pattern: piclaw-${{ github.ref_name }}-macos-x64-portable
          path: artifacts/release
          merge-multiple: true

      - name: Download experimental shell artifact
        uses: actions/download-artifact@v8
        with:
          pattern: piclaw-desktop-${{ github.ref_name }}-macos-x64
          path: artifacts/release
          merge-multiple: true

      - name: List release assets
        run: |
          find artifacts/release -maxdepth 2 -type f -print

      - name: Create release if needed and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" \
              --verify-tag \
              --generate-notes \
              --title "PiClaw $TAG_NAME"

          gh release upload "$TAG_NAME" artifacts/release/* --clobber